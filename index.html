<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamara Uddeshya - Shanti Ki Aur</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            text-align: center; 
            background: #fdfcf0; /* Royal Cream Background */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Shahi Box Styling */
        .box { 
            background: white; 
            padding: 35px 25px; 
            border-radius: 15px; 
            /* Double Border for Royal Look */
            border: 5px double #800000; 
            outline: 2px solid #D4AF37;
            display: inline-block; 
            width: 85%; 
            max-width: 350px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            position: relative;
        }

        /* Profile Image / Logo Styling */
        img { 
            width: 110px; 
            height: 110px;
            border-radius: 50%; 
            border: 3px solid #D4AF37; 
            margin-bottom: 15px; 
            object-fit: cover;
        }

        h2 { 
            color: #800000; 
            font-family: 'Playfair Display', serif;
            font-size: 18px; 
            margin-bottom: 25px; 
            letter-spacing: 1px;
            line-height: 1.4;
        }

        /* Inputs Styling */
        input { 
            width: 85%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 5px; 
            border: 1px solid #D4AF37; 
            background: #fffcf5;
            font-size: 16px; 
            outline: none;
        }

        input:focus {
            border: 2px solid #800000;
        }

        /* Button Styling */
        button { 
            width: 95%; 
            padding: 14px; 
            background: #800000; /* Royal Maroon */
            color: #D4AF37; /* Gold Text */
            border: 1px solid #D4AF37; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        button:hover {
            background: #5d0000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #team-page { 
            display: none; 
        }

        .welcome-text {
            color: #1b5e20; /* Deep Green */
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: bold;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent);
            margin: 20px 0;
        }

        .mission-text {
            color: #333;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <img src="1777210190036.png" alt="Logo">
        <h2>HAMARA UDDESHYA<br><span style="font-size: 14px; color: #555;">ASHANTI SE SHANTI KI AUR</span></h2>
        <input type="text" id="mob" placeholder="Mobile Number">
        <input type="password" id="pw" placeholder="Password (test0716)">
        <button onclick="checkIn()">LOGIN</button>
    </div>

    <div id="team-page" class="box">
        <h1 id="welcome-msg" class="welcome-text"></h1>
        <p style="color:#555; font-style: italic; font-size: 14px;">Aapka Digital System Chalu Hai.</p>
        
        <div class="divider"></div>
        
        <p class="mission-text">Mission: Shanti Ki Aur</p>
        
        <button style="background:#800000; color: #D4AF37;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        function checkIn() {
            var m = document.getElementById('mob').value;
            var p = document.getElementById('pw').value;
            
            var team = {
                "9568111616": "GURU0716",
                "9927963150": "SUNIL DIXIT",
                "2222222222": "Sadasya 2",
                "3333333333": "Sadasya 3",
                "4444444444": "Sadasya 4",
                "5555555555": "Sadasya 5",
                "6666666666": "Sadasya 6",
                "7777777777": "Sadasya 7"
            };

            if (team[m] && p === "test0716") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('team-page').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Swaagat hai, " + team[m] + "!";
            } else { 
                alert("Maafi chahte hain, details galat hain!"); 
            }
        }
    </script>
</body>
</html>
