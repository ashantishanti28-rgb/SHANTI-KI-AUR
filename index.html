<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control - Hamara Uddeshya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-maroon { background-color: #800000; }
        .text-maroon { color: #800000; }
        .admin-box { border: 2px solid #800000; background: #fff5f5; border-radius: 15px; padding: 15px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border-t-8 border-maroon p-8">
            <img src="https://ashantishanti28-rgb.github.io/SHANTI-KI-AUR/1777210190036.png" class="w-20 h-20 mx-auto rounded-full mb-4 border shadow">
            <h2 class="text-xl font-black text-maroon text-center uppercase mb-6">मिशन लॉगिन</h2>
            <input type="tel" id="userMobile" class="w-full p-4 border-2 rounded-2xl mb-4 font-bold text-center" placeholder="MOBILE NUMBER">
            <input type="password" id="userPass" class="w-full p-4 border-2 rounded-2xl mb-6 text-center" placeholder="PASSWORD">
            <button onclick="checkLogin()" class="w-full bg-maroon text-white font-black py-4 rounded-2xl shadow-xl uppercase">प्रवेश करें</button>
        </div>
    </div>
    <div id="portalSection" class="hidden min-h-screen flex flex-col">
        <header class="bg-maroon text-white p-4 flex justify-between items-center border-b-4 border-gray-300 shadow-lg">
            <h1 class="text-xs font-black uppercase">मिशन कंट्रोल रूम</h1>
            <button onclick="location.reload()" class="bg-white text-maroon text-[9px] font-black px-3 py-1 rounded-full">LOGOUT</button>
        </header>
        <main class="p-4 space-y-6 max-w-7xl mx-auto w-full">
            <div id="adminPanel" class="hidden admin-box">
                <h3 class="text-maroon font-black text-xs uppercase mb-3">टीम (10 मेम्बर्स)</h3>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-2" id="memberGrid"></div>
            </div>
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border">
                <div class="bg-gray-50 p-4 border-b flex justify-between items-center">
                    <h3 class="text-xs font-black text-maroon uppercase">शिकायत विवरण</h3>
                    <button onclick="loadData()" class="text-[10px] font-bold text-blue-600">REFRESH</button>
                </div>
                <div class="overflow-x-auto text-[11px]">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-gray-500 font-black border-b">
                            <tr><th class="p-4">दिनांक</th><th class="p-4">मोबाइल</th><th class="p-4">मेम्बर</th><th class="p-4">विवरण</th></tr>
                        </thead>
                        <tbody id="caseList" class="divide-y italic"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script>
        const TEAM_MEMBERS = {
            "9568111616": { name: "GURU JI", pass: "admin786", role: "ADMIN" },
            "9927963150": { name: "SUNIL JI", pass: "sunil786", role: "MEMBER" },
            "9456238253": { name: "RAJ", pass: "pass: "RAJ123", role: "MEMBER" },
            "9000000002": { name: "MEMBER 4", pass: "pass004", role: "MEMBER" },
            "9000000003": { name: "MEMBER 5", pass: "pass005", role: "MEMBER" },
            "9000000004": { name: "MEMBER 6", pass: "pass006", role: "MEMBER" },
            "9000000005": { name: "MEMBER 7", pass: "pass007", role: "MEMBER" },
            "9000000006": { name: "MEMBER 8", pass: "pass008", role: "MEMBER" },
            "9000000007": { name: "MEMBER 9", pass: "pass009", role: "MEMBER" },
            "9000000008": { name: "MEMBER 10", pass: "pass010", role: "MEMBER" }
        };
        let loggedInUser = ""; let isAdmin = false;
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxhEPyu7wNh77vVbQPd9O5bzpjbTNDa9HX3l8Y-aRv1J1UnXJ5Tr1aCGL8a94/exec';
        function checkLogin() {
            const m = document.getElementById('userMobile').value;
            const p = document.getElementById('userPass').value;
            if (TEAM_MEMBERS[m] && TEAM_MEMBERS[m].pass === p) {
                loggedInUser = m; isAdmin = (TEAM_MEMBERS[m].role === "ADMIN");
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('portalSection').classList.remove('hidden');
                if(isAdmin) { document.getElementById('adminPanel').classList.remove('hidden'); renderGrid(); }
                loadData();
            } else { alert("Error!"); }
        }
        function renderGrid() {
            const grid = document.getElementById('memberGrid'); grid.innerHTML = "";
            for (let mob in TEAM_MEMBERS) {
                grid.innerHTML += `<div class="bg-white p-2 border rounded shadow-sm text-center"><p class="text-[9px] font-black text-maroon">${TEAM_MEMBERS[mob].name}</p><p class="text-[8px] text-gray-500">${mob}</p></div>`;
            }
        }
        async function loadData() {
            const list = document.getElementById('caseList'); list.innerHTML = "<tr><td colspan='4' class='p-10 text-center font-bold'>Loading...</td></tr>";
            try {
                const response = await fetch(`${scriptUrl}?action=read&user=${loggedInUser}&admin=${isAdmin}`);
                const data = await response.json(); list.innerHTML = "";
                data.reverse().forEach(item => {
                    list.innerHTML += `<tr><td class="p-4 text-gray-500 font-bold">${new Date(item.timestamp).toLocaleDateString()}</td><td class="p-4 font-black text-maroon">${item.mobile}</td><td class="p-4 text-blue-700 font-bold">${item.team}</td><td class="p-4">${item.message}</td></tr>`;
                });
            } catch (e) { list.innerHTML = "<tr><td colspan='4' class='p-10 text-center'>Connection Error</td></tr>"; }
        }
    </script>
</body>
</html>
