<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 40px; }
        .box { background: white; padding: 30px; border-radius: 20px; border: 4px solid maroon; display: inline-block; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        img { width: 150px; border-radius: 50%; border: 2px solid maroon; margin-bottom: 15px; }
        h2 { color: maroon; font-size: 16px; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 97%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="1777210190036.png">
        <h2>HAMARA UDDESHY:<br>ASHANTI SE SHANTI KI AUR</h2>
        <input type="text" id="u" placeholder="Mobile Number">
        <input type="password" id="p" placeholder="Password">
        <button onclick="login()">LOGIN</button>
    </div>
    <script>
        function login(){
            var u=document.getElementById('u').value;
            var p=document.getElementById('p').value;
            if(u=='9999999999' && p=='test123'){ 
                alert('Swaagat hai! Software Engine Chalu Ho Gaya.'); 
            } else { 
                alert('Galat Number ya Password!'); 
            }
        }
    </script>
</body>
</html>
