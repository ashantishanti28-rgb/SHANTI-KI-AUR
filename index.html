<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शांति की ओर</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 10px; display: flex; justify-content: center; -webkit-user-select: none; user-select: none; }
        .master-card { background: white; width: 100%; max-width: 500px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4a0000, #800000); color: #ffffff; padding: 35px 20px; text-align: center; border-bottom: 4px solid #ffffff; }
        .header h2 { font-size: 26px; font-weight: 900; line-height: 1.4; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.6); }
        .content { padding: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 18px; border: 2px solid #000000; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #ffffff; color: #000000 !important; font-weight: 800 !important; }
        input::placeholder, textarea::placeholder { color: #000000 !important; opacity: 1 !important; font-weight: 800 !important; }
        .btn-send { background: #800000; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 18px; }
        .btn-check { background: #4682B4; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">
<div class="master-card">
    <div class="header">
        <h2>हमारा उद्देश्य:<br>अशांति से शांति की ओर</h2>
    </div>
    <div class="content">
        <form id="mainForm">
            <input type="text" name="name" placeholder="आपका पूरा नाम" required>
            <input type="tel" name="mob" placeholder="मोबाइल नंबर (10 अंक)" pattern="[0-9]{10}" required>
            <select name="state" required>
                <option value="Sampurn Bharat">सम्पूर्ण भारत (All India)</option>
                <option value="Uttar Pradesh">उत्तर प्रदेश</option>
                <option value="Delhi">दिल्ली</option>
                <option value="Other">अन्य</option>
            </select>
            <textarea name="msg" rows="4" placeholder="अपनी समस्या विस्तार से लिखें..." required></textarea>
            <button type="submit" class="btn-send" id="submitBtn">मैसेज भेजें</button>
        </form>
        <div style="text-align: center; margin: 30px 0; color: #000; font-weight: 900;">— जवाब यहाँ देखें —</div>
        <input type="text" id="checkId" placeholder="मोबाइल नंबर डालें">
        <button onclick="viewChat()" class="btn-check" id="viewBtn">अपना जवाब चेक करें</button>
        <div id="display-area"></div>
    </div>
</div>
<script>
    document.getElementById('mainForm').addEventListener('submit', function(e){
        e.preventDefault();
        const b = document.getElementById('submitBtn');
        b.disabled = true; b.innerText = "भेज रहा हूँ...";
        const form = document.getElementById('mainForm');
        google.script.run.withSuccessHandler(function(res){
            alert(res); form.reset();
            b.disabled = false; b.innerText = "मैसेज भेजें";
        }).processForm({name: form.name.value, mobile: form.mob.value, state: form.state.value, message: form.msg.value});
    });
    function viewChat(){
        const id = document.getElementById('checkId').value;
        if(!id) return alert("मोबाइल नंबर डालें");
        google.script.run.withSuccessHandler(function(res){
            const area = document.getElementById('display-area');
            area.innerHTML = res; area.style.display = "block";
        }).checkStatus(id);
    }
</script>
</body>
</html>
