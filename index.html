DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 20px; }
        .box { background: white; padding: 25px; border-radius: 20px; border: 4px solid maroon; display: inline-block; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        img { width: 120px; border-radius: 50%; border: 2px solid maroon; margin-bottom: 10px; }
        h2 { color: maroon; font-size: 15px; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 97%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        #team-page { display: none; padding: 20px; background: #fff; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="login-screen" class="box">
        <img src="1777210190036.png">
        <h2>HAMARA UDDESHYA<br>ASHANTI SE SHANTI KI AUR</h2>
        <input type="text" id="mob" placeholder="Mobile Number">
        <input type="password" id="pw" placeholder="Password (test123)">
        <button onclick="checkIn()">LOGIN</button>
    </div>

    <div id="team-page" class="box">
        <h1 id="welcome-msg" style="color:green; font-size: 20px;"></h1>
        <p style="color:#555;">Aapka Digital System Chalu Hai.</p>
        <hr>
        <p>Mission: Shanti Ki Aur</p>
        <button style="background:maroon" onclick="location.reload()">LOGOUT</button>
    </div>

    <script>
        function checkIn() {
            var m = document.getElementById('mob').value;
            var p = document.getElementById('pw').value;
            var team = {
                "9568111616": "GURU0716",
                "9927963150": "SUNIL DIXIT",
                "2222222222": "Sadasya 2",
                "3333333333": "Sadasya 3",
                "4444444444": "Sadasya 4",
                "5555555555": "Sadasya 5",
                "6666666666": "Sadasya 6",
                "7777777777": "Sadasya 7"
            };
            if (team[m] && p === "test0716") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('team-page').style.display = 'block';
                document.getElementById('welcome-msg').innerText = "Swaagat hai, " + team[m] + "!";
            } else { alert("Maafi chahte hain, details galat hain!"); }
        }
    </script>
</body>
</html>
