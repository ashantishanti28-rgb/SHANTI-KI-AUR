
 <script>
        const ALLOWED_USERS = { 
            "9568111616": "admin786", 
            "9927963150": "sunil786" 
        };

        let loggedInMobile = "";

        function checkLogin() {
            const m = document.getElementById('userMobile').value;
            const p = document.getElementById('userPass').value;
            if (ALLOWED_USERS[m] && ALLOWED_USERS[m] === p) {
                loggedInMobile = m;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('portalSection').classList.remove('hidden');
                if (m === "9568111616") {
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function showMembers() {
            document.getElementById('entryBox').classList.add('hidden');
            document.getElementById('memberListView').classList.remove('hidden');
        }

        function hideMembers() {
            document.getElementById('entryBox').classList.remove('hidden');
            document.getElementById('memberListView').classList.add('hidden');
        }

        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwK_RCqXqXDUFTJcRCbBuMj3UaduwUjVfNfOCk9sL8jtQD98gn6mn_PSqA7S3EaYNaH/exec';

        document.getElementById('entryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerHTML = 'SAVING...';
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    team: loggedInMobile,
                    mobile: document.getElementById('mobile').value,
                    message: document.getElementById('message').value
                })
            }).then(() => {
                alert('✅ Data Save Ho Gaya!');
                document.getElementById('entryForm').reset();
                btn.disabled = false; btn.innerHTML = 'SAVE DATA';
            });
        });
    </script>
</body>
</html
